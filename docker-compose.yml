services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.18.0
    container_name: freerange-elasticsearch
    environment:
      - node.name=es-node-1
      - cluster.name=freerange-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - freerange-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: freerange-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - freerange-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    command: redis-server --appendonly yes

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freerange-notification-service
    ports:
      - "${FREERANGE_SERVER_PORT:-8080}:8080"
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - FREERANGE_DATABASE_URLS=http://elasticsearch:9200
      - FREERANGE_REDIS_HOST=redis
      - FREERANGE_REDIS_PORT=6379
      - FREERANGE_SECURITY_CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080,https://*.ngrok-free.app
    networks:
      - freerange-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  notification-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freerange-notification-worker
    command: ["./worker"]
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - FREERANGE_DATABASE_URLS=http://elasticsearch:9200
      - FREERANGE_REDIS_HOST=redis
      - FREERANGE_REDIS_PORT=6379
    networks:
      - freerange-network
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: freerange-ui
    ports:
      - "3000:3000"
    environment:
      - API_PROXY_TARGET=http://notification-service:8080
      - VITE_META_APP_ID=${VITE_META_APP_ID:-}
      - VITE_META_CONFIG_ID=${VITE_META_CONFIG_ID:-}
      - VITE_META_BUSINESS_ID=${VITE_META_BUSINESS_ID:-}
      - VITE_META_WABA_ID=${VITE_META_WABA_ID:-}
      - VITE_META_PHONE_NUMBER_ID=${VITE_META_PHONE_NUMBER_ID:-}
    depends_on:
      - notification-service
    networks:
      - freerange-network

volumes:
  elasticsearch_data:
  redis_data:

networks:
  freerange-network:
    driver: bridge
