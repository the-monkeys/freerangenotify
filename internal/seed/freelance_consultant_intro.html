<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello from {{.name}}</title>
    <style>
        @media only screen and (max-width: 620px) {
            .outer-pad {
                padding: 22px 10px !important;
            }

            .card {
                width: 100% !important;
                padding: 30px 20px !important;
                border-radius: 12px !important;
            }

            .intro-title {
                font-size: 24px !important;
            }

            .intro-copy {
                font-size: 15px !important;
                line-height: 1.6 !important;
            }

            .cta-link {
                width: 100% !important;
                box-sizing: border-box !important;
                text-align: center !important;
            }
        }
    </style>
</head>
<body style="margin:0;padding:0;background-color:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
    <table width="100%" border="0" cellspacing="0" cellpadding="0">
        <tr>
            <td align="center" style="padding:60px 10px;" class="outer-pad">
                <table width="500" border="0" cellspacing="0" cellpadding="0" class="card" style="background-color:#ffffff;border:1px solid #e5e7eb;border-radius:16px;padding:50px;">
                    <tr>
                        <td align="center" style="padding-bottom:30px;">
                            <img src="{{.profile_pic}}" alt="{{.name}}" width="100" height="100" style="border-radius:50%;display:block;border:3px solid #f3f4f6;object-fit:cover;" />
                        </td>
                    </tr>
                    <tr>
                        <td align="center">
                            <h1 class="intro-title" style="margin:0 0 10px 0;color:#111827;font-size:28px;font-weight:800;">Hi, I'm {{.name}}</h1>
                            <p style="margin:0 0 30px 0;color:#6b7280;font-size:16px;font-weight:500;">{{.title}}</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding-bottom:40px;">
                            <p class="intro-copy" style="margin:0 0 20px 0;color:#374151;font-size:16px;line-height:1.7;">{{.intro_p1}}</p>
                            <p class="intro-copy" style="margin:0;color:#374151;font-size:16px;line-height:1.7;">{{.intro_p2}}</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center">
                            <a href="{{.booking_url}}" class="cta-link" style="display:inline-block;padding:14px 32px;background-color:#111827;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;border-radius:30px;">{{.cta_text}}</a>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding-top:40px;">
                            <a href="{{.website_url}}" style="color:#6b7280;font-size:14px;text-decoration:none;font-weight:500;">{{.website_url}}</a>
                        </td>
                    </tr>
                </table>
                <p style="margin:30px 0 0 0;color:#9ca3af;font-size:12px;text-align:center;">
                    <a href="{{.unsubscribe_url}}" style="color:#9ca3af;text-decoration:underline;">Unsubscribe</a>
                </p>
            </td>
        </tr>
    </table>
</body>
</html>
