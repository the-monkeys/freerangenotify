app:
  name: "FreeRangeNotify"
  version: "1.0.0"
  environment: "development"
  debug: true
  log_level: "debug"

server:
  host: "0.0.0.0"
  port: 8080
  public_url: ""  # Set to your public-facing URL (e.g. https://notify.example.com). Falls back to http://localhost:8080
  read_timeout: 60
  write_timeout: 0  # 0 means no timeout (required for SSE)
  idle_timeout: 120

database:
  urls:
    - "http://localhost:9200"
  username: ""
  password: ""
  max_retries: 3
  timeout: 30
  index_prefix: "freerange_dev"

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 100
  max_retries: 3
  min_idle_conn: 10

queue:
  type: "redis"  # redis or kafka
  workers: 5
  concurrency: 3
  retry_attempts: 3
  retry_delay: 5

# Provider credentials are supplied via environment variables.
# Viper picks them up automatically with the FREERANGE_ prefix
# (e.g., FREERANGE_PROVIDERS_SMTP_HOST overrides providers.smtp.host).
# Only put plain defaults here — never ${VAR:-default} shell syntax.
providers:
  fcm:
    server_key: ""
    project_id: ""
    timeout: 30
    max_retries: 3
  
  apns:
    key_id: ""
    team_id: ""
    bundle_id: ""
    key_path: ""
    production: false
  
  sendgrid:
    api_key: ""
    from_email: "noreply@freerangenotify.com"
    from_name: "FreeRangeNotify"
    timeout: 30
    max_retries: 3
  
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""
    from_email: ""
    from_name: ""
    timeout: 30
    max_retries: 3
  
  twilio:
    account_sid: ""
    auth_token: ""
    from_number: ""
    timeout: 30
    max_retries: 3

  # Phase 3
  slack:
    enabled: false
    default_webhook_url: ""
    timeout: 10
    max_retries: 3

  discord:
    enabled: false
    default_webhook_url: ""
    timeout: 10
    max_retries: 3

  whatsapp:
    enabled: true
    account_sid: ""
    auth_token: ""
    from_number: ""
    timeout: 15
    max_retries: 3

  meta_whatsapp:
    enabled: false
    phone_number_id: ""
    waba_id: ""
    access_token: ""
    api_version: "v23.0"
    app_secret: ""       # Meta App Secret for webhook X-Hub-Signature-256 verification
    webhook_verify: ""   # Verification token for Meta webhook subscription (hub.verify_token)
    timeout: 15
    max_retries: 3
    meta_app_id: ""      # Facebook App ID for Embedded Signup OAuth flow
    meta_app_secret: ""  # Facebook App Secret for token exchange (keep secret!)

  # AWS SES (Phase C)
  ses:
    enabled: false
    region: "us-east-1"
    access_key_id: ""
    secret_access_key: ""
    from_email: ""
    from_name: "FreeRangeNotify"

monitoring:
  enabled: true
  port: 9090
  path: "/metrics"
  namespace: "freerange_dev"

security:
  jwt_secret: "dev-secret-key-change-in-production"
  jwt_access_expiration: 15  # minutes
  jwt_refresh_expiration: 10080  # 7 days in minutes
  api_key_header: "X-API-Key"
  rate_limit: 100  # requests per window
  rate_limit_window: 3600  # seconds
  cors:
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:8080"
      - "https://*.ngrok-free.app"  # for Meta OAuth testing via ngrok
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Origin"
      - "Content-Type"
      - "Accept"
      - "Authorization"
      - "X-API-Key"
    exposed_headers: []
    allow_credentials: true
    max_age: 86400

# Feature flags
features:
  # Phase 1
  workflow_enabled: true
  digest_enabled: true
  sse_hmac_enforced: true
  trial_welcome_enabled: true
  # Phase 2
  topics_enabled: true
  throttle_enabled: false
  audit_enabled: true
  rbac_enabled: true
  # Phase 4
  template_versioning_enabled: true 
  snooze_enabled: true
  # Phase 6
  multi_environment_enabled: true
  # WhatsApp Meta Cloud API (Tech Provider)
  whatsapp_meta_enabled: false

licensing:
  enabled: false
  deployment_mode: "hosted"   # hosted | self_hosted
  fail_mode: "fail_closed"    # fail_closed | fail_open
  cache_ttl_seconds: 300
  grace_window_seconds: 900
  hosted:
    source: "internal_es"     # internal_es | webhook_sync
  self_hosted:
    license_key: ""
    public_key_pem: ""
    license_server_url: ""
    verify_interval_seconds: 300