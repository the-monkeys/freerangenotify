app:
  name: "FreeRangeNotify"
  version: "1.0.0"
  environment: "development"
  debug: true
  log_level: "debug"

server:
  host: "0.0.0.0"
  port: 8080
  public_url: ""  # Set to your public-facing URL (e.g. https://notify.example.com). Falls back to http://localhost:8080
  read_timeout: 60
  write_timeout: 0  # 0 means no timeout (required for SSE)
  idle_timeout: 120

database:
  urls:
    - "http://localhost:9200"
  username: ""
  password: ""
  max_retries: 3
  timeout: 30
  index_prefix: "freerange_dev"

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  pool_size: 100
  max_retries: 3
  min_idle_conn: 10

queue:
  type: "redis"  # redis or kafka
  workers: 5
  concurrency: 3
  retry_attempts: 3
  retry_delay: 5

providers:
  fcm:
    server_key: "${FCM_SERVER_KEY:-}"
    project_id: "${FCM_PROJECT_ID:-}"
    timeout: 30
    max_retries: 3
  
  apns:
    key_id: "${APNS_KEY_ID:-}"
    team_id: "${APNS_TEAM_ID:-}"
    bundle_id: "${APNS_BUNDLE_ID:-}"
    key_path: "${APNS_KEY_PATH:-}"
    production: false
  
  sendgrid:
    api_key: "${FREERANGE_PROVIDERS_SENDGRID_API_KEY:-}"
    from_email: "${FREERANGE_PROVIDERS_SENDGRID_FROM_EMAIL:-noreply@freerangenotify.com}"
    from_name: "${FREERANGE_PROVIDERS_SENDGRID_FROM_NAME:-FreeRangeNotify}"
    timeout: 30
    max_retries: 3
  
  smtp:
    host: "${FREERANGE_PROVIDERS_SMTP_HOST:-}"
    port: "${FREERANGE_PROVIDERS_SMTP_PORT:-587}"
    username: "${FREERANGE_PROVIDERS_SMTP_USERNAME:-}"
    password: "${FREERANGE_PROVIDERS_SMTP_PASSWORD:-}"
    from_email: "${FREERANGE_PROVIDERS_SMTP_FROM_EMAIL:-}"
    from_name: "${FREERANGE_PROVIDERS_SMTP_FROM_NAME:-}"
    timeout: 30
    max_retries: 3
  
  twilio:
    account_sid: "${TWILIO_ACCOUNT_SID:-}"
    auth_token: "${TWILIO_AUTH_TOKEN:-}"
    from_number: "${TWILIO_FROM_NUMBER:-}"
    timeout: 30
    max_retries: 3

  # Phase 3
  slack:
    enabled: false
    default_webhook_url: "${FREERANGE_PROVIDERS_SLACK_DEFAULT_WEBHOOK_URL:-}"
    timeout: 10
    max_retries: 3

  discord:
    enabled: false
    default_webhook_url: "${FREERANGE_PROVIDERS_DISCORD_DEFAULT_WEBHOOK_URL:-}"
    timeout: 10
    max_retries: 3

  whatsapp:
    enabled: false
    account_sid: "${FREERANGE_PROVIDERS_WHATSAPP_ACCOUNT_SID:-}"
    auth_token: "${FREERANGE_PROVIDERS_WHATSAPP_AUTH_TOKEN:-}"
    from_number: "${FREERANGE_PROVIDERS_WHATSAPP_FROM_NUMBER:-}"
    timeout: 15
    max_retries: 3

monitoring:
  enabled: true
  port: 9090
  path: "/metrics"
  namespace: "freerange_dev"

security:
  jwt_secret: "${JWT_SECRET:-dev-secret-key-change-in-production}"
  jwt_access_expiration: 15  # minutes
  jwt_refresh_expiration: 10080  # 7 days in minutes
  api_key_header: "X-API-Key"
  rate_limit: 100  # requests per window
  rate_limit_window: 3600  # seconds
  cors:
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:8080"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed_headers:
      - "Origin"
      - "Content-Type"
      - "Accept"
      - "Authorization"
      - "X-API-Key"
    exposed_headers: []
    allow_credentials: true
    max_age: 86400

# Feature flags
features:
  # Phase 1
  workflow_enabled: true
  digest_enabled: true
  sse_hmac_enforced: true
  # Phase 2
  topics_enabled: true
  throttle_enabled: false
  audit_enabled: true
  rbac_enabled: true
  # Phase 4
  template_versioning_enabled: true 
  snooze_enabled: true
  # Phase 6
  multi_environment_enabled: true