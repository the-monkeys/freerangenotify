# FreeRangeNotify — Production Deployment
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. docker compose -f docker-compose.prod.yml pull
#   3. docker compose -f docker-compose.prod.yml up -d
#
# To update to the latest images:
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: freerange-elasticsearch
    environment:
      - node.name=es-node-1
      - cluster.name=freerange-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - freerange-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: freerange-redis
    volumes:
      - redis_data:/data
    networks:
      - freerange-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    command: redis-server --appendonly yes
    restart: unless-stopped

  notification-service:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}:latest
    container_name: freerange-notification-service
    ports:
      - "${FREERANGE_SERVER_PORT:-8080}:8080"
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - FREERANGE_DATABASE_URLS=http://elasticsearch:9200
      - FREERANGE_REDIS_HOST=redis
      - FREERANGE_REDIS_PORT=6379
    networks:
      - freerange-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  notification-worker:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}:latest
    container_name: freerange-notification-worker
    command: [ "./worker" ]
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - FREERANGE_DATABASE_URLS=http://elasticsearch:9200
      - FREERANGE_REDIS_HOST=redis
      - FREERANGE_REDIS_PORT=6379
    networks:
      - freerange-network
    restart: unless-stopped

  ui:
    image: ghcr.io/${GHCR_OWNER}/${GHCR_REPO}-ui:latest
    container_name: freerange-ui
    ports:
      - "${UI_PORT:-80}:80"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    depends_on:
      - notification-service
    networks:
      - freerange-network
    restart: unless-stopped

volumes:
  elasticsearch_data:
  redis_data:


networks:
  freerange-network:
    driver: bridge
