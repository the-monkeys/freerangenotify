name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    # Gated: e2e specs require a running backend stack + credentials
    # (E2E_USER_PASSWORD, app/template/user fixtures) that aren't provisioned
    # in this workflow. Set the repository variable `E2E_ENABLED=true` once
    # the CI stack-up + secrets wiring is in place to enable this job.
    # Until then it no-ops so PRs aren't blocked on environment that doesn't
    # exist in CI.
    if: ${{ vars.E2E_ENABLED == 'true' }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
