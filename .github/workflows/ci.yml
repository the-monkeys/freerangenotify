name: CI — Test, Coverage & Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}
  UI_IMAGE: ${{ github.repository }}-ui
  GO_VERSION: "1.24"

jobs:
  # ── Unit Tests + Coverage ──────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write          # for test-reporter annotations
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run unit tests with coverage
        run: |
          gotestsum --junitfile unit-results.xml -- \
            -short -coverprofile=unit-coverage.out -covermode=atomic ./...
          go tool cover -func=unit-coverage.out | tail -1

      - name: Publish unit test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: unit-results.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload unit coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: unit-coverage.out
          retention-days: 7

  # ── Integration Tests ──────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write          # for test-reporter annotations
      contents: read
    env:
      # Shared across all steps — server, worker, migrate, and tests all use these.
      FREERANGE_DATABASE_URLS: http://localhost:9200
      FREERANGE_REDIS_HOST: localhost
      FREERANGE_REDIS_PORT: "6379"
      FREERANGE_SECURITY_JWT_SECRET: ci-test-jwt-secret
      JWT_SECRET: ci-test-jwt-secret
      FREERANGE_SECURITY_OPS_SECRET: ci-test-ops-secret
      FREERANGE_SECURITY_OPS_ENABLED: "true"
      FREERANGE_APP_ENVIRONMENT: development
      FREERANGE_APP_DEBUG: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Start infrastructure services
        run: |
          # Create empty .env so docker compose doesn't fail on env_file references
          touch .env

          docker compose up -d elasticsearch redis

          echo "Waiting for Elasticsearch..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9200/_cluster/health > /dev/null 2>&1; then
              echo "Elasticsearch ready after ~$((i*2))s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: Elasticsearch did not become ready in time"
              docker compose logs elasticsearch
              exit 1
            fi
            sleep 2
          done

          echo "Waiting for Redis..."
          for i in $(seq 1 15); do
            if docker compose exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "Redis ready"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "ERROR: Redis did not become ready in time"
              docker compose logs redis
              exit 1
            fi
            sleep 1
          done

      - name: Build application binaries
        run: |
          go build -o bin/server  ./cmd/server
          go build -o bin/worker  ./cmd/worker
          go build -o bin/migrate ./cmd/migrate

      - name: Run database migration
        run: ./bin/migrate

      - name: Start server and worker
        run: |
          nohup ./bin/server > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid

          nohup ./bin/worker > /tmp/worker.log 2>&1 &
          echo $! > /tmp/worker.pid

          echo "Waiting for notification service..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/v1/health > /dev/null 2>&1; then
              echo "Notification service ready after ~$((i*2))s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "ERROR: Notification service did not become healthy"
              cat /tmp/server.log
              exit 1
            fi
            sleep 2
          done

      - name: Generate admin token for tests
        id: token
        run: |
          TOKEN=$(go run ./scripts/ci/gen_token.go)
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        env:
          INTEGRATION_ADMIN_TOKEN: ${{ steps.token.outputs.token }}
          FREERANGE_OPS_SECRET: ci-test-ops-secret
        run: |
          gotestsum --junitfile integration-results.xml -- \
            -v -timeout 300s -coverprofile=integration-coverage.out -covermode=atomic \
            ./tests/integration/...
          go tool cover -func=integration-coverage.out | tail -1

      - name: Publish integration test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Integration Test Results
          path: integration-results.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload integration coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: integration-coverage.out
          retention-days: 7

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Server log ==="
          cat /tmp/server.log 2>/dev/null || true
          echo "=== Worker log ==="
          cat /tmp/worker.log 2>/dev/null || true
          echo "=== Elasticsearch log ==="
          docker compose logs --tail=80 elasticsearch 2>/dev/null || true

      - name: Stop services
        if: always()
        run: |
          [ -f /tmp/server.pid ] && kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          [ -f /tmp/worker.pid ] && kill "$(cat /tmp/worker.pid)" 2>/dev/null || true
          docker compose down -v

  # ── Merge Coverage ─────────────────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always() && needs.unit-tests.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage

      - name: Merge and report coverage
        run: |
          go install github.com/wadey/gocovmerge@latest

          FILES=""
          for f in coverage/*/*.out; do
            [ -f "$f" ] && FILES="$FILES $f"
          done

          if [ -z "$FILES" ]; then
            echo "No coverage files found"
            exit 0
          fi

          gocovmerge $FILES > merged-coverage.out

          echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=merged-coverage.out | tail -20 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          TOTAL=$(go tool cover -func=merged-coverage.out | tail -1 | awk '{print $3}')
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total Coverage: ${TOTAL}**" >> "$GITHUB_STEP_SUMMARY"
          echo "Total Coverage: ${TOTAL}"

      - name: Upload merged coverage
        uses: actions/upload-artifact@v4
        with:
          name: merged-coverage
          path: merged-coverage.out
          retention-days: 30

  # ── Build & Push Backend Image ─────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & Push UI Image ──────────────────────────────────
  build-ui:
    name: Build UI Image
    runs-on: ubuntu-latest
    needs: [unit-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.UI_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ./ui/Dockerfile.prod
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
