name: CI — Test, Coverage & Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}
  UI_IMAGE: ${{ github.repository }}-ui
  GO_VERSION: "1.24"

jobs:
  # ── Unit Tests + Coverage ──────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests with coverage
        run: |
          go test -short -coverprofile=unit-coverage.out -covermode=atomic ./...
          go tool cover -func=unit-coverage.out | tail -1

      - name: Upload unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: unit-coverage.out
          retention-days: 7

  # ── Integration Tests ──────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Start services
        run: |
          docker compose up -d elasticsearch redis
          echo "Waiting for Elasticsearch..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9200/_cluster/health > /dev/null 2>&1; then
              echo "Elasticsearch ready"
              break
            fi
            sleep 2
          done
          echo "Waiting for Redis..."
          for i in $(seq 1 10); do
            if docker compose exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; then
              echo "Redis ready"
              break
            fi
            sleep 1
          done

      - name: Build and start application services
        env:
          FREERANGE_DATABASE_URLS: http://localhost:9200
          FREERANGE_REDIS_HOST: localhost
          FREERANGE_REDIS_PORT: "6379"
          FREERANGE_SECURITY_JWT_SECRET: ci-test-jwt-secret
          JWT_SECRET: ci-test-jwt-secret
          FREERANGE_SECURITY_OPS_SECRET: ci-test-ops-secret
          FREERANGE_SECURITY_OPS_ENABLED: "true"
        run: |
          # Build and run server + worker natively (faster than Docker build)
          go build -o bin/server ./cmd/server
          go build -o bin/worker ./cmd/worker
          go build -o bin/migrate ./cmd/migrate

          # Run migration
          ./bin/migrate &
          MIGRATE_PID=$!
          wait $MIGRATE_PID || true

          # Start server
          ./bin/server &
          echo $! > /tmp/server.pid

          # Start worker
          ./bin/worker &
          echo $! > /tmp/worker.pid

          # Wait for server health
          echo "Waiting for notification service..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/v1/health > /dev/null 2>&1; then
              echo "Notification service ready"
              break
            fi
            sleep 2
          done

      - name: Generate admin token for tests
        id: token
        run: |
          # Register a test admin user
          REGISTER_RESP=$(curl -sf -X POST http://localhost:8080/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci-admin@test.local","password":"CiTestP@ss123","full_name":"CI Admin"}' || echo '{}')

          # If registration requires verification, generate token directly via Go
          # using the known CI JWT secret
          TOKEN=$(go run -mod=mod - <<'GOEOF'
          package main
          import (
              "fmt"
              "time"
              "github.com/golang-jwt/jwt/v5"
          )
          func main() {
              claims := &struct {
                  UserID string `json:"user_id"`
                  Email  string `json:"email"`
                  jwt.RegisteredClaims
              }{
                  UserID: "00000000-0000-0000-0000-000000000001",
                  Email:  "ci-admin@test.local",
                  RegisteredClaims: jwt.RegisteredClaims{
                      ExpiresAt: jwt.NewNumericDate(time.Now().Add(1 * time.Hour)),
                      IssuedAt:  jwt.NewNumericDate(time.Now()),
                      NotBefore: jwt.NewNumericDate(time.Now()),
                  },
              }
              t := jwt.NewWithClaims(jwt.SigningMethodHS256, claims)
              s, _ := t.SignedString([]byte("ci-test-jwt-secret"))
              fmt.Print(s)
          }
          GOEOF
          )
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run integration tests
        env:
          INTEGRATION_ADMIN_TOKEN: ${{ steps.token.outputs.token }}
          FREERANGE_OPS_SECRET: ci-test-ops-secret
          FREERANGE_DATABASE_URLS: http://localhost:9200
          FREERANGE_REDIS_HOST: localhost
          FREERANGE_REDIS_PORT: "6379"
          FREERANGE_SECURITY_JWT_SECRET: ci-test-jwt-secret
          JWT_SECRET: ci-test-jwt-secret
        run: |
          go test -v -timeout 300s -coverprofile=integration-coverage.out -covermode=atomic ./tests/integration/...
          go tool cover -func=integration-coverage.out | tail -1

      - name: Upload integration coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: integration-coverage.out
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          [ -f /tmp/server.pid ] && kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          [ -f /tmp/worker.pid ] && kill "$(cat /tmp/worker.pid)" 2>/dev/null || true
          docker compose down -v

  # ── Merge Coverage ─────────────────────────────────────────
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always() && needs.unit-tests.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage

      - name: Merge and report coverage
        run: |
          # Install gocovmerge
          go install github.com/wadey/gocovmerge@latest

          # Collect all .out files
          FILES=""
          for f in coverage/*/*.out; do
            if [ -f "$f" ]; then
              FILES="$FILES $f"
            fi
          done

          if [ -z "$FILES" ]; then
            echo "No coverage files found"
            exit 0
          fi

          # Merge
          gocovmerge $FILES > merged-coverage.out

          # Summary
          echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=merged-coverage.out | tail -20 >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          # Total line
          TOTAL=$(go tool cover -func=merged-coverage.out | tail -1 | awk '{print $3}')
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total Coverage: ${TOTAL}**" >> "$GITHUB_STEP_SUMMARY"
          echo "Total Coverage: ${TOTAL}"

      - name: Upload merged coverage
        uses: actions/upload-artifact@v4
        with:
          name: merged-coverage
          path: merged-coverage.out
          retention-days: 30

  # ── Build & Push Backend Image ─────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & Push UI Image ──────────────────────────────────
  build-ui:
    name: Build UI Image
    runs-on: ubuntu-latest
    needs: [unit-tests]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.UI_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ./ui/Dockerfile.prod
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
