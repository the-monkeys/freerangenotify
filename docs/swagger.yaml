host: localhost:8080
info:
  contact:
    email: support@freerangenotify.com
    name: API Support
  description: High-performance notification service with multi-channel delivery support
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: FreeRangeNotify API
  version: 0.1.9-alpha
paths:
  /v1/admin/analytics/summary:
    get:
      description: Retrieve aggregated analytics including notification counts, success
        rates, channel breakdown, and daily trends
      parameters:
      - default: 7d
        description: Time period (1d, 7d, 30d, 90d)
        in: query
        name: period
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get analytics summary
      tags:
      - Analytics
  /v1/admin/audit:
    get:
      description: Query audit logs with filters for app, actor, action, resource,
        and pagination
      parameters:
      - description: Filter by application ID
        in: query
        name: app_id
        type: string
      - description: Filter by actor ID
        in: query
        name: actor_id
        type: string
      - description: Filter by action
        in: query
        name: action
        type: string
      - description: Filter by resource type
        in: query
        name: resource
        type: string
      - description: Filter by resource ID
        in: query
        name: resource_id
        type: string
      - description: Filter by environment ID
        in: query
        name: environment_id
        type: string
      - default: 50
        description: Limit results
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List audit logs
      tags:
      - Audit
  /v1/admin/audit/{id}:
    get:
      description: Retrieve a single audit log entry by its ID
      parameters:
      - description: Audit Log ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get an audit log entry
      tags:
      - Audit
  /v1/admin/playground/sse:
    post:
      description: Generate a temporary SSE playground session with a 30-minute TTL
        for testing real-time notifications
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create an SSE playground
      tags:
      - Playground
  /v1/admin/playground/sse/{id}/send:
    post:
      consumes:
      - application/json
      description: Publish a test notification to an SSE playground session
      parameters:
      - description: Playground ID
        in: path
        name: id
        required: true
        type: string
      - description: Optional message content (title, body, category, data)
        in: body
        name: body
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Send an SSE test message
      tags:
      - Playground
  /v1/admin/playground/webhook:
    post:
      description: Generate a temporary webhook receiver URL with a 30-minute TTL
        for testing
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a webhook playground
      tags:
      - Playground
  /v1/admin/providers/health:
    get:
      description: Retrieve the health status of all configured notification delivery
        providers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get provider health status
      tags:
      - Admin
  /v1/admin/queues/dlq:
    get:
      description: Retrieve failed notification items from the dead-letter queue
      parameters:
      - default: 10
        description: Number of items to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List dead-letter queue items
      tags:
      - Admin
  /v1/admin/queues/dlq/replay:
    post:
      description: Re-enqueue failed notifications from the dead-letter queue for
        reprocessing
      parameters:
      - default: 10
        description: Maximum items to replay
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Replay dead-letter queue items
      tags:
      - Admin
  /v1/admin/queues/stats:
    get:
      description: Retrieve notification queue depth and processing statistics
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get queue statistics
      tags:
      - Admin
  /v1/apps:
    get:
      description: List all applications owned by or shared with the authenticated
        user
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: Filter by application name
        in: query
        name: app_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List applications
      tags:
      - Applications
    post:
      consumes:
      - application/json
      description: Create a new application and generate an API key
      parameters:
      - description: Application creation request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_the-monkeys_freerangenotify_internal_interfaces_http_dto.CreateApplicationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a new application
      tags:
      - Applications
  /v1/apps/{app_id}/team:
    get:
      description: Retrieve all members of an application's team
      parameters:
      - description: Application ID
        in: path
        name: app_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List team members
      tags:
      - Team
    post:
      consumes:
      - application/json
      description: Add a new member to an application's team
      parameters:
      - description: Application ID
        in: path
        name: app_id
        required: true
        type: string
      - description: Invitation request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_the-monkeys_freerangenotify_internal_domain_auth.InviteMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Invite a team member
      tags:
      - Team
  /v1/apps/{app_id}/team/{membership_id}:
    delete:
      description: Remove a member from an application's team
      parameters:
      - description: Application ID
        in: path
        name: app_id
        required: true
        type: string
      - description: Membership ID
        in: path
        name: membership_id
